backend:
  name: github
  repo: tiberge85/ramya-site
  branch: main
  # Portier OAuth (Deno Deploy) — remplace l'ancien service Netlify
  base_url: https://happy-emu-1276.tiberge85.deno.net
  auth_endpoint: auth

# Langue de l'interface
locale: fr

# Dossier où sont rangées les images téléversées depuis l'admin
media_folder: images
public_folder: /images

# Message affiché en haut de l'admin
site_url: https://www.ramyaci.tech/
display_url: https://www.ramyaci.tech/

collections:
  - name: parametres
    label: "Textes & Coordonnées"
    files:
      - name: coordonnees
        label: "Coordonnées (tél, email, adresse)"
        file: data/site.json
        description: "Ces informations s'appliquent automatiquement sur tout le site (pied de page de chaque page)."
        fields:
          - { label: "Téléphone 1", name: telephone1, widget: string, required: false }
          - { label: "Téléphone 2", name: telephone2, widget: string, required: false }
          - { label: "Téléphone 3", name: telephone3, widget: string, required: false }
          - { label: "Email", name: email, widget: string, required: false }
          - { label: "Adresse (ligne 1)", name: adresse, widget: string, required: false }
          - { label: "Ville / Pays (ligne 2)", name: ville, widget: string, required: false }
          - { label: "— Titre Accueil (principal)", name: accueil_titre, widget: string, required: false }
          - { label: "— Titre Accueil (partie orange)", name: accueil_titre_accent, widget: string, required: false }
          - { label: "— Sous-titre Accueil", name: accueil_soustitre, widget: text, required: false }
          - { label: "— Titre À propos (principal)", name: apropos_titre, widget: string, required: false }
          - { label: "— Titre À propos (partie orange)", name: apropos_titre_accent, widget: string, required: false }
          - { label: "— Sous-titre À propos", name: apropos_soustitre, widget: text, required: false }
          - { label: "— Titre Solutions (principal)", name: solutions_titre, widget: string, required: false }
          - { label: "— Titre Solutions (partie orange)", name: solutions_titre_accent, widget: string, required: false }
          - { label: "— Sous-titre Solutions", name: solutions_soustitre, widget: text, required: false }

  - name: textes
    label: "Textes des pages"
    files:
      - name: accueil
        label: "Page Accueil"
        file: data/textes.json
        description: "Modifie les textes de la page d'accueil (les autres pages seront ajoutées ensuite)."
        fields:
          - label: "Accueil"
            name: accueil
            widget: object
            fields:
              - { label: "Section « Nos solutions » — titre", name: services_titre, widget: string, required: false }
              - { label: "Section « Nos solutions » — texte d'intro", name: services_intro, widget: text, required: false }
              - { label: "Carte 1 — titre", name: card1_titre, widget: string, required: false }
              - { label: "Carte 1 — description", name: card1_desc, widget: text, required: false }
              - { label: "Carte 2 — titre", name: card2_titre, widget: string, required: false }
              - { label: "Carte 2 — description", name: card2_desc, widget: text, required: false }
              - { label: "Carte 3 — titre", name: card3_titre, widget: string, required: false }
              - { label: "Carte 3 — description", name: card3_desc, widget: text, required: false }
              - { label: "Carte 4 — titre", name: card4_titre, widget: string, required: false }
              - { label: "Carte 4 — description", name: card4_desc, widget: text, required: false }
              - { label: "Carte 5 — titre", name: card5_titre, widget: string, required: false }
              - { label: "Carte 5 — description", name: card5_desc, widget: text, required: false }
              - { label: "Carte 6 — titre", name: card6_titre, widget: string, required: false }
              - { label: "Carte 6 — description", name: card6_desc, widget: text, required: false }
              - { label: "Appel à l'action — titre", name: cta_titre, widget: string, required: false }
              - { label: "Appel à l'action — texte", name: cta_texte, widget: text, required: false }
              - { label: "Statistique 1 — libellé", name: stat1_label, widget: string, required: false }
              - { label: "Statistique 2 — libellé", name: stat2_label, widget: string, required: false }
              - { label: "Statistique 3 — libellé", name: stat3_label, widget: string, required: false }
              - { label: "Statistique 4 — libellé", name: stat4_label, widget: string, required: false }
              - { label: "Bandeau partenaires — titre", name: partenaires, widget: string, required: false }

  - name: blog
    label: "Blog — Articles"
    files:
      - name: articles
        label: "Liste des articles"
        file: data/articles.json
        description: "Ajoute, modifie ou supprime les articles du blog."
        fields:
          - label: "Articles"
            name: articles
            widget: list
            label_singular: "Article"
            summary: "{{fields.titre}}"
            fields:
              - { label: "Identifiant (unique)", name: id, widget: string, hint: "Ex. 009 — laisse unique" }
              - { label: "Titre", name: titre, widget: string }
              - label: "Catégorie"
                name: cat
                widget: select
                options:
                  - Vidéosurveillance
                  - "Contrôle d'Accès"
                  - "Sécurité Incendie"
                  - "Géolocalisation"
                  - "Sécurité Résidentielle"
                  - "Systèmes Intégrés"
              - { label: "Date", name: date, widget: string, hint: "Format AAAA-MM-JJ, ex. 2025-04-15" }
              - { label: "Auteur", name: auteur, widget: string, default: "Équipe Ramya" }
              - { label: "Temps de lecture", name: lecture, widget: string, default: "5 min de lecture" }
              - { label: "Image", name: img, widget: image, required: false, hint: "Téléverse une photo ou laisse vide" }
              - { label: "Résumé", name: resume, widget: text }
              - { label: "À la une ?", name: une, widget: boolean, required: false, default: false }

  - name: projets
    label: "Projets — Réalisations"
    files:
      - name: projets
        label: "Liste des projets"
        file: data/projets.json
        description: "Ajoute, modifie ou supprime les projets affichés sur la page Projets."
        fields:
          - label: "Projets"
            name: projets
            widget: list
            label_singular: "Projet"
            summary: "{{fields.titre}}"
            fields:
              - { label: "Identifiant (unique)", name: id, widget: string }
              - label: "Catégorie (filtre)"
                name: filtre
                widget: select
                options:
                  - { label: "Vidéosurveillance", value: "cctv" }
                  - { label: "Contrôle d'Accès", value: "access" }
                  - { label: "Protection Périmétrique", value: "perimeter" }
                  - { label: "Géolocalisation", value: "geo" }
              - { label: "Nom de la catégorie (affiché)", name: categorie, widget: string, hint: "Ex. CCTV & Surveillance" }
              - { label: "Icône", name: icone, widget: string, required: false, hint: "Nom d'icône Material, ex. videocam, fingerprint, radar, directions_car, home" }
              - { label: "Titre", name: titre, widget: string }
              - { label: "Image", name: image, widget: image, required: false, hint: "Photo du projet (laisse vide pour afficher une icône)" }
              - { label: "Description", name: description, widget: text }
              - label: "Tags / chiffres clés"
                name: tags
                widget: list
                required: false
                field: { label: "Tag", name: tag, widget: string }

  - name: carte
    label: "Carte — Installations"
    files:
      - name: installations
        label: "Liste des installations"
        file: data/installations.json
        description: "Les points affichés sur la carte des installations."
        fields:
          - label: "Installations"
            name: installations
            widget: list
            label_singular: "Installation"
            summary: "{{fields.nom}} — {{fields.ville}}"
            fields:
              - { label: "Identifiant (unique)", name: id, widget: string }
              - { label: "Nom du site", name: nom, widget: string }
              - label: "Type"
                name: type
                widget: select
                options:
                  - Vidéosurveillance
                  - "Contrôle d'Accès"
                  - "Sécurité Incendie"
                  - "Géolocalisation"
                  - "Sécurité Résidentielle"
                  - "Systèmes Intégrés"
              - { label: "Quartier", name: quartier, widget: string, required: false }
              - { label: "Ville", name: ville, widget: string }
              - { label: "Pays", name: pays, widget: string, default: "Côte d'Ivoire" }
              - { label: "Continent", name: continent, widget: string, default: "Afrique" }
              - { label: "Latitude", name: lat, widget: number, value_type: float, hint: "Ex. 5.3419" }
              - { label: "Longitude", name: lng, widget: number, value_type: float, hint: "Ex. -3.9958" }
              - { label: "Date (AAAA-MM)", name: date, widget: string, required: false }
              - { label: "Équipement", name: equip, widget: string, required: false }
              - { label: "Description", name: desc, widget: text, required: false }
