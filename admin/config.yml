          - label: "Accueil"
            name: accueil
            widget: object
            fields:
              - { label: "Section « Nos solutions » — titre", name: services_titre, widget: string, required: false }
              - { label: "Section « Nos solutions » — texte d'intro", name: services_intro, widget: text, required: false }
              - { label: "Carte 1 — titre", name: card1_titre, widget: string, required: false }
              - { label: "Carte 1 — description", name: card1_desc, widget: text, required: false }
