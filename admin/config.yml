backend:
  name: github
  repo: tiberge85/ramya-site
  branch: main

# Langue de l'interface
locale: fr

# Dossier où sont rangées les images téléversées depuis l'admin
media_folder: images
public_folder: /images

# Message affiché en haut de l'admin
site_url: https://ramyatechnologie.netlify.app
display_url: https://ramyatechnologie.netlify.app

collections:
  - name: parametres
    label: "Coordonnées du site"
    files:
      - name: coordonnees
        label: "Téléphone, email, adresse"
        file: data/site.json
        description: "Ces informations s'appliquent automatiquement sur tout le site (pied de page de chaque page)."
        fields:
          - { label: "Téléphone 1", name: telephone1, widget: string, required: false }
          - { label: "Téléphone 2", name: telephone2, widget: string, required: false }
          - { label: "Téléphone 3", name: telephone3, widget: string, required: false }
          - { label: "Email", name: email, widget: string, required: false }
          - { label: "Adresse (ligne 1)", name: adresse, widget: string, required: false }
          - { label: "Ville / Pays (ligne 2)", name: ville, widget: string, required: false }

  - name: blog
    label: "Blog — Articles"
    files:
      - name: articles
        label: "Liste des articles"
        file: data/articles.json
        description: "Ajoute, modifie ou supprime les articles du blog."
        fields:
          - label: "Articles"
            name: articles
            widget: list
            label_singular: "Article"
            summary: "{{fields.titre}}"
            fields:
              - { label: "Identifiant (unique)", name: id, widget: string, hint: "Ex. 009 — laisse unique" }
              - { label: "Titre", name: titre, widget: string }
              - label: "Catégorie"
                name: cat
                widget: select
                options:
                  - Vidéosurveillance
                  - "Contrôle d'Accès"
                  - "Sécurité Incendie"
                  - "Géolocalisation"
                  - "Sécurité Résidentielle"
                  - "Systèmes Intégrés"
              - { label: "Date", name: date, widget: string, hint: "Format AAAA-MM-JJ, ex. 2025-04-15" }
              - { label: "Auteur", name: auteur, widget: string, default: "Équipe Ramya" }
              - { label: "Temps de lecture", name: lecture, widget: string, default: "5 min de lecture" }
              - { label: "Image", name: img, widget: image, required: false, hint: "Téléverse une photo ou laisse vide" }
              - { label: "Résumé", name: resume, widget: text }
              - { label: "À la une ?", name: une, widget: boolean, required: false, default: false }

  - name: carte
    label: "Carte — Installations"
    files:
      - name: installations
        label: "Liste des installations"
        file: data/installations.json
        description: "Les points affichés sur la carte des installations."
        fields:
          - label: "Installations"
            name: installations
            widget: list
            label_singular: "Installation"
            summary: "{{fields.nom}} — {{fields.ville}}"
            fields:
              - { label: "Identifiant (unique)", name: id, widget: string }
              - { label: "Nom du site", name: nom, widget: string }
              - label: "Type"
                name: type
                widget: select
                options:
                  - Vidéosurveillance
                  - "Contrôle d'Accès"
                  - "Sécurité Incendie"
                  - "Géolocalisation"
                  - "Sécurité Résidentielle"
                  - "Systèmes Intégrés"
              - { label: "Quartier", name: quartier, widget: string, required: false }
              - { label: "Ville", name: ville, widget: string }
              - { label: "Pays", name: pays, widget: string, default: "Côte d'Ivoire" }
              - { label: "Continent", name: continent, widget: string, default: "Afrique" }
              - { label: "Latitude", name: lat, widget: number, value_type: float, hint: "Ex. 5.3419" }
              - { label: "Longitude", name: lng, widget: number, value_type: float, hint: "Ex. -3.9958" }
              - { label: "Date (AAAA-MM)", name: date, widget: string, required: false }
              - { label: "Équipement", name: equip, widget: string, required: false }
              - { label: "Description", name: desc, widget: text, required: false }
