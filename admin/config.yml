backend:
  name: github
  repo: tiberge85/ramya-site
  branch: main
  # Portier OAuth (Deno Deploy) — remplace l'ancien service Netlify
  base_url: https://happy-emu-1276.tiberge85.deno.net
  auth_endpoint: auth

# Langue de l'interface
locale: fr

# Dossier où sont rangées les images téléversées depuis l'admin
media_folder: images
public_folder: /images

# Message affiché en haut de l'admin
site_url: https://www.ramyaci.tech/
display_url: https://www.ramyaci.tech/

collections:
  - name: parametres
    label: "Textes & Coordonnées"
    files:
      - name: coordonnees
        label: "Coordonnées (tél, email, adresse)"
        file: data/site.json
        description: "Ces informations s'appliquent automatiquement sur tout le site (pied de page de chaque page)."
        fields:
          - { label: "Téléphone 1", name: telephone1, widget: string, required: false }
          - { label: "Téléphone 2", name: telephone2, widget: string, required: false }
          - { label: "Téléphone 3", name: telephone3, widget: string, required: false }
          - { label: "Email", name: email, widget: string, required: false }
          - { label: "Adresse (ligne 1)", name: adresse, widget: string, required: false }
          - { label: "Ville / Pays (ligne 2)", name: ville, widget: string, required: false }
          - { label: "— Titre Accueil (principal)", name: accueil_titre, widget: string, required: false }
          - { label: "— Titre Accueil (partie orange)", name: accueil_titre_accent, widget: string, required: false }
          - { label: "— Sous-titre Accueil", name: accueil_soustitre, widget: text, required: false }
          - { label: "— Titre À propos (principal)", name: apropos_titre, widget: string, required: false }
          - { label: "— Titre À propos (partie orange)", name: apropos_titre_accent, widget: string, required: false }
          - { label: "— Sous-titre À propos", name: apropos_soustitre, widget: text, required: false }
          - { label: "— Titre Solutions (principal)", name: solutions_titre, widget: string, required: false }
          - { label: "— Titre Solutions (partie orange)", name: solutions_titre_accent, widget: string, required: false }
          - { label: "— Sous-titre Solutions", name: solutions_soustitre, widget: text, required: false }

  - name: textes
    label: "Textes des pages"
    files:
      - name: accueil
        label: "Page Accueil"
        file: data/textes.json
        description: "Modifie les textes de la page d'accueil (les autres pages seront ajoutées ensuite)."
